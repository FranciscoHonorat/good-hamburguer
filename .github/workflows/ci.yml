name: ci

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "Desafio Técnico - Good Hamburguer/Desafio Técnico - Good Hamburguer.csproj"

      - name: Build app
        run: dotnet build "Desafio Técnico - Good Hamburguer/Desafio Técnico - Good Hamburguer.csproj" --configuration Release --no-restore

      - name: Test unit
        run: dotnet test "Desafio Técnico - Good Hamburguer.Tests.Unit/Desafio Técnico - Good Hamburguer.Tests.Unit.csproj" --configuration Release

      - name: Test integration
        run: dotnet test "Desafio Técnico - Good Hamburguer.Tests.Integration/Desafio Técnico - Good Hamburguer.Tests.Integration.csproj" --configuration Release

      - name: Docker build validation
        run: docker build -t good-hamburger:ci .
